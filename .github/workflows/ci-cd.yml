name: CI/CD Pipeline

# When does this workflow run?
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# What jobs does it run?
jobs:
  build-and-test:
    # The type of machine to run on (Ubuntu Linux)
    runs-on: ubuntu-latest

    # Steps to perform in this job
    steps:
      # Step 1: Get the code from the repository
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Set up Node.js
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'   # caches npm dependencies to speed up future runs

      # Step 3: Install dependencies
      - name: Install dependencies
        run: npm ci      # 'npm ci' is faster and stricter than 'npm install' for CI

      # Step 4: Run tests
      - name: Run tests
        run: npm test

      # Step 5: (Optional) Build the app
      - name: Build
        run: npm run build --if-present   # only runs if a "build" script exists
